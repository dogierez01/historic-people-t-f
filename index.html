    function renderList() {
        if (!list) return;
        list.innerHTML = db.map((item, i) => {
            if (currentMode === 'learn') {
                return `
                    <div class="card" style="border-left:5px solid #01796F;">
                        <div class="card-title">${item.title}</div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="playAudioOnly(${i})" style="flex:1; padding:12px; background:#333; color:#fff; border:1px solid #555; border-radius:8px; cursor:pointer; font-weight:bold;">🔊 Listen</button>
                            <button onclick="openReadMode(${i})" style="flex:1; padding:12px; background:#01796F; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">📜 Read Story</button>
                        </div>
                    </div>`;
            } else {
                return `
                    <div class="card" onclick="openQuizMode(${i})" style="cursor:pointer; border-left: 5px solid #9C27B0;">
                        <div class="card-title">${item.title}</div>
                        <div style="font-size:12px; color:#aaa; margin-top:5px;">Tap to start History Quiz 🧠</div>
                    </div>`;
            }
        }).join('');
    }

    function setMode(mode) {
        currentMode = mode;

        document.getElementById('btn-quiz').className = (mode === 'quiz') ? 'toggle-btn active' : 'toggle-btn';
        if(modal.style.display === "block") {
            document.getElementById('view-learn').style.display = (mode === 'learn') ? 'block' : 'none';
            document.getElementById('view-quiz').style.display = (mode === 'quiz') ? 'block' : 'none';
        }
        renderList();
    }

        const BASE_URL = `https://raw.githubusercontent.com/${USER}/${REPO}/main/`;
        
        const fileName = encodeURIComponent(title.toLowerCase() + ".wav");
        player.src = BASE_URL + fileName;
        player.playbackRate = isSlowMode ? 0.8 : 1.0;
        player.play().catch(e => console.log("Audio logic active. Waiting for file upload..."));
    }

    function playAudioOnly(i) { playSmartAudio(db[i].title); }

    function openReadMode(i) {
        const item = db[i];
        modal.style.display = "block";
        document.getElementById('story-title').innerText = item.title;
        document.getElementById('view-learn').style.display = 'block';
        document.getElementById('view-quiz').style.display = 'none';
        document.getElementById('story-text').innerText = item.text;
        playSmartAudio(item.title);
    }

    function openQuizMode(i) {
        const item = db[i];
        modal.style.display = "block";
        document.getElementById('story-title').innerText = item.title + " Quiz";
        document.getElementById('view-learn').style.display = 'none';
        document.getElementById('view-quiz').style.display = 'block';
        player.pause(); 
        document.getElementById('quiz-area').innerHTML = item.questions.map((q, idx) => `
            <div class="quiz-q">
                <div style="font-weight:bold; margin-bottom:10px;">${idx+1}. ${q.q}</div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-tf btn-true" onclick="checkAnswer(this, ${q.a}, true)">TRUE</button>
                    <button class="btn-tf btn-false" onclick="checkAnswer(this, ${q.a}, false)">FALSE</button>
                </div>
                <div class="feedback"></div>
            </div>`).join('');
    }

    function checkAnswer(btn, ans, userAns) {
        const fb = btn.parentElement.parentElement.querySelector('.feedback');
        if (ans === userAns) { fb.innerText = "✅ CORRECT!"; fb.style.color = "#2ecc71"; }
        else { fb.innerText = "❌ WRONG!"; fb.style.color = "#e74c3c"; }
    }

    function closeModal() { modal.style.display = "none"; player.pause(); }

    function toggleSnail() {
        isSlowMode = !isSlowMode;
        player.playbackRate = isSlowMode ? 0.8 : 1.0;
        snailBtn.classList.toggle('active');
    }

    function startApp() {
        const screen = document.getElementById('welcome-screen');
        if(screen) {
            screen.style.opacity = '0';
            setTimeout(() => { screen.style.display = 'none'; }, 800);
        }
    }

    renderList();
</script>
</body>
</html>
